services:
  - type: web
    name: micmonitor-server
    runtime: node
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STUN_URL
        value: stun:stun.l.google.com:19302
